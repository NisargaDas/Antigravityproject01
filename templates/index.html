<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Cloud Tech Conference 2026</title>
    <meta name="description" content="1-Day Technical Conference on Google Cloud Technologies">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero">
        <div class="container hero-content">
            <h1>Google Cloud Tech Conference 2026</h1>
            <p class="hero-date">Date: March 20, 2026</p>
            <p class="hero-location">Location: Moscone Center, San Francisco, CA</p>
            <p class="hero-desc">Join us for a 1-day event exploring the future of cloud computing, AI, and infrastructure.</p>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search by title, category, or speaker...">
        </section>

        <section class="schedule-section">
            <h2>Conference Schedule</h2>
            <div id="scheduleContainer" class="schedule-container">
                <!-- Schedule items injected here via JS -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Google Cloud Tech Conference. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</html>
